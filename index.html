<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的會員集點卡</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ========================================================
        // 【設定 1】請貼上你的 Firebase 金鑰
        // ========================================================
        const firebaseConfig = {
        apiKey: "AIzaSyAqsN1y3eNHtQ4PiYpWIuxZC8eN6o0bK24",
        authDomain: "line-loyalty-card.firebaseapp.com",
        projectId: "line-loyalty-card",
        storageBucket: "line-loyalty-card.firebasestorage.app",
        messagingSenderId: "284106917293",
        appId: "1:284106917293:web:2675c8c6dfe4d4d27e4d24"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ========================================================
        // 【設定 2】請貼上你的 LINE LIFF ID
        // ========================================================
        const myLiffId = '2010135064-mXyTOHst'; 

        window.onload = function() {
            liff.init({ liffId: myLiffId })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        liff.getProfile()
                            .then(profile => {
                                const userId = profile.userId; 
                                const userName = profile.displayName; 

                                document.getElementById('username').innerText = "嗨！ " + userName;
                                document.getElementById('username').classList.remove('loading');

                                // 1. 執行開戶檢查與載入點數
                                checkAndCreateUserWallet(userId, userName);

                                // 2. 【核心功能】把客人的 UID 變成 QR Code
                                generateMemberQRCode(userId);

                                // 3. 載入客人的歷史明細
                                loadPointHistory(userId);
                            })
                            .catch(err => console.error('抓取 LINE 失敗', err));
                    }
                })
                .catch(err => {
                    document.getElementById('username').innerText = "系統初始化失敗";
                });
        };

        // 檢查開戶
        async function checkAndCreateUserWallet(userId, userName) {
            const pointsEl = document.getElementById('points-display');
            try {
                const userDocRef = doc(db, "users", userId);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    pointsEl.innerText = userDocSnap.data().totalPoints || 0;
                } else {
                    await setDoc(userDocRef, {
                        lineName: userName,
                        totalPoints: 0,
                        createdAt: new Date().toISOString()
                    });
                    pointsEl.innerText = 0;
                }
            } catch (error) {
                console.error(error);
            }
        }

        // 核心：生成會員 QR Code
        function generateMemberQRCode(userId) {
            // 清空原本的欄位（防重複生成）
            document.getElementById("qrcode").innerHTML = "";
            
            // 使用套件在網頁畫面上塞入一張包含客戶 UID 的 QR Code
            new QRCode(document.getElementById("qrcode"), {
                text: userId,         // 這張條碼掃出來的內容就是客人的 LINE UID
                width: 180,           // 寬度 180 像素
                height: 180,          // 高度 180 像素
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 核心：載入點數明細給客戶看
        async function loadPointHistory(userId) {
            const historyListEl = document.getElementById('history-list');
            historyListEl.innerHTML = "<li>明細載入中...</li>";

            try {
                // 去資料庫撈取歷史紀錄，按照時間由新到舊排序
                const logRef = collection(db, "users", userId, "point_log");
                const q = query(logRef, orderBy("obtainedAt", "desc"));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    historyListEl.innerHTML = "<li>目前尚無點數歷史紀錄</li>";
                    return;
                }

                let htmlContent = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const obtainedDate = new Date(data.obtainedAt).toLocaleDateString();
                    const expiredDate = new Date(data.expiredAt).toLocaleDateString();
                    
                    let statusTxt = "有效";
                    if (data.status === "used") statusTxt = "已使用";
                    if (data.status === "canceled") statusTxt = "已註銷(發錯扣回)";
                    
                    // 檢查是否過期
                    if (data.status === "valid" && new Date() > new Date(data.expiredAt)) {
                        statusTxt = "已過期";
                    }

                    // 判斷正負數符號
                    let pointStr = data.pointsObtained > 0 ? `+${data.pointsObtained}` : `${data.pointsObtained}`;
                    let remarkStr = data.remark ? ` (${data.remark})` : "";

                    htmlContent += `
                        <li>
                            <strong>${pointStr} 點</strong> - ${statusTxt}${remarkStr}<br>
                            <small>發放日: ${obtainedDate} | 到期日: ${expiredDate}</small>
                        </li>
                    `;
                });
                historyListEl.innerHTML = htmlContent;

            } catch (error) {
                console.error("載入明細失敗:", error);
                historyListEl.innerHTML = "<li>無法載入明細，請重新整理</li>";
            }
        }
    </script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px 10px; color: #333; }
        .card { background-color: white; border-radius: 15px; padding: 20px; width: 90%; max-width: 360px; margin: 0 auto 20px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { color: #2cb42c; font-size: 24px; margin: 5px 0; }
        .user-name { font-size: 18px; font-weight: bold; margin: 10px 0; color: #111; }
        .points-section { background-color: #eafaea; border: 2px dashed #2cb42c; border-radius: 10px; padding: 10px; margin: 15px 0; }
        .points-num { font-size: 42px; font-weight: bold; color: #2cb42c; line-height: 1.2; }
        
        /* QR Code 區塊樣式 */
        .qrcode-section { margin: 20px auto; padding: 10px; background: #fff; width: 180px; height: 180px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); border-radius: 5px; }
        .qrcode-tip { font-size: 13px; color: #e67e22; font-weight: bold; margin-bottom: 15px; }

        /* 歷史明細區塊樣式 */
        .history-section { background-color: white; border-radius: 15px; padding: 20px; width: 90%; max-width: 360px; margin: 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: left; box-sizing: border-box; }
        .history-section h3 { margin-top: 0; color: #555; border-bottom: 1px solid #eee; padding-bottom: 8px; font-size: 16px; }
        .history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        .history-list li { padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; line-height: 1.5; }
        .history-list li:last-child { border-bottom: none; }
        .loading { color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>數位集點卡</h1>
        <div id="username" class="user-name loading">正在載入您的 LINE 資訊...</div>
        
        <div class="points-section">
            <p style="margin:0; color:#666; font-size: 14px;">目前可用總點數</p>
            <div id="points-display" class="points-num">--</div>
        </div>

        <div class="qrcode-tip">請出示下方條碼給店員掃描</div>
        <div id="qrcode" class="qrcode-section"></div>
    </div>

    <div class="history-section">
        <h3>歷史點數明細 (含過期日)</h3>
        <ul id="history-list" class="history-list">
            <li>載入中...</li>
        </ul>
    </div>

</body>
</html>
