<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員集點系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqsN1y3eNHtQ4PiYpWIuxZC8eN6o0bK24",
            authDomain: "line-loyalty-card.firebaseapp.com",
            projectId: "line-loyalty-card",
            storageBucket: "line-loyalty-card.firebasestorage.app",
            messagingSenderId: "284106917293",
            appId: "1:284106917293:web:2675c8c6dfe4d4d27e4d24"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const myLiffId = '2010135064-mXyTOHst'; 
        let currentLiffUserId = ""; 
        let targetUserId = ""; 
        let customerClickCount = 0; 
        let staffClickCount = 0;    
        let pendingCancel = {}; 
        let pendingDeleteUid = ""; 
        let pendingCouponId = ""; 

        window.onload = function() {
            liff.init({ liffId: myLiffId, withLoginOnExternalBrowser: true })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        document.getElementById('customer-view').style.display = "block";
                        document.getElementById('staff-view').style.display = "none";
                        document.getElementById('boss-view').style.display = "none";
                        
                        liff.getProfile().then(profile => {
                            currentLiffUserId = profile.userId; 
                            document.getElementById('username').innerText = "嗨！ " + profile.displayName;
                            checkAndCreateUserWallet(profile.userId, profile.displayName);
                            generateMemberQRCode(profile.userId);
                            loadPointHistory(profile.userId);
                            loadCustomerCouponHistory(profile.userId);
                        });
                    }
                })
                .catch(err => showCustomAlert("系統連線失敗，請重開 LINE 再試。"));
        };

        // 自動檢查並建立會員錢包
        async function checkAndCreateUserWallet(userId, displayName) {
            try {
                const userDocRef = doc(db, "users", userId);
                const userDocSnap = await getDoc(userDocRef);
                if (!userDocSnap.exists()) {
                    await setDoc(userDocRef, {
                        lineName: displayName,
                        totalPoints: 0,
                        createdAt: new Date().toISOString()
                    });
                    document.getElementById('points-display').innerText = "0";
                } else {
                    document.getElementById('points-display').innerText = userDocSnap.data().totalPoints || 0;
                }
            } catch (e) {
                document.getElementById('points-display').innerText = "錯";
            }
        }

        // 產生 QR Code
        function generateMemberQRCode(userId) {
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: userId,
                width: 180,
                height: 180,
                colorDark: "#6e5b5e",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // 載入客人的點數歷史紀錄
        async function loadPointHistory(userId) {
            const listEl = document.getElementById('history-list');
            try {
                const q = query(collection(db, "users", userId, "point_log"), orderBy("obtainedAt", "desc"));
                const qSnapshot = await getDocs(q);
                if (qSnapshot.empty) { listEl.innerHTML = "<li>目前尚無任何點數收支紀錄</li>"; return; }
                
                let html = "";
                qSnapshot.forEach(docSnap => {
                    const log = docSnap.data();
                    if (log.status === "canceled") return; 
                    let isAdd = log.pointsObtained > 0;
                    html += `<li><strong style="color:${isAdd ? '#c97288':'#8a7377'}">${isAdd ? '+':''}${log.pointsObtained} 點</strong><br><small>${log.remark} (${new Date(log.obtainedAt).toLocaleDateString()})</small></li>`;
                });
                listEl.innerHTML = html;
            } catch(e) { listEl.innerHTML = "<li>點數明細載入失敗</li>"; }
        }

        // 階梯分流第一層（顧客點5下切店家）
        window.handleCustomerTitleClick = function() {
            customerClickCount++;
            if (customerClickCount === 5) {
                customerClickCount = 0; 
                document.getElementById('customer-view').style.display = "none";
                document.getElementById('boss-view').style.display = "none";
                document.getElementById('staff-view').style.display = "block";
                showCustomAlert("已成功切換至店家管理後台");
            }
            setTimeout(() => { customerClickCount = 0; }, 3000); 
        };

        // 階梯分流第二層（店家點5下切老闆娘）
        window.handleStaffTitleClick = function() {
            staffClickCount++;
            if (staffClickCount === 5) {
                staffClickCount = 0; 
                showBossLoginModal(); 
            }
            setTimeout(() => { staffClickCount = 0; }, 3000); 
        };

        function showCustomAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert-overlay').style.display = "flex";
        }
        window.closeCustomAlert = function() {
            document.getElementById('custom-alert-overlay').style.display = "none";
        };

        function showBossLoginModal() {
            document.getElementById('boss-pass-input').value = ""; 
            document.getElementById('boss-login-overlay').style.display = "flex";
        }
        window.closeBossLoginModal = function() {
            document.getElementById('boss-login-overlay').style.display = "none";
        };
        window.confirmBossLogin = function() {
            const bossPass = document.getElementById('boss-pass-input').value;
            if (bossPass === "0412888") {
                closeBossLoginModal();
                document.getElementById('customer-view').style.display = "none";
                document.getElementById('staff-view').style.display = "none";
                document.getElementById('boss-view').style.display = "block";
                showCustomAlert("歡迎最美老闆娘登入最高階系統");
                loadAllCustomers(); 
                loadBossCouponsMaster(); 
            } else {
                closeBossLoginModal(); 
                setTimeout(() => { showCustomAlert("密碼錯誤，請重新解鎖。"); }, 300); 
            }
        };

        // 店員發點與扣點控制
        window.changePoints = function(amount) {
            let input = document.getElementById('points-input');
            let current = parseInt(input.value) || 0;
            let newVal = current + amount;
            input.value = newVal;
            toggleFormFields(newVal);
        };

        function toggleFormFields(val) {
            if (val < 0) {
                document.getElementById('remark-add-group').style.display = "none";
                document.getElementById('remark-deduct-group').style.display = "block";
                document.getElementById('expiry-group').style.display = "none";
            } else {
                document.getElementById('remark-add-group').style.display = "block";
                document.getElementById('remark-deduct-group').style.display = "none";
                document.getElementById('expiry-group').style.display = "block";
            }
        }

        window.setExpireDays = function(days) {
            if (days === 'custom') {
                document.getElementById('custom-days-input').style.display = "block";
            } else {
                document.getElementById('custom-days-input').style.display = "none";
                document.getElementById('custom-days-input').value = days;
            }
        };

        window.setDeductRemark = function(mode) {
            if (mode === 'custom') {
                document.getElementById('custom-remark-deduct-box').style.display = "block";
            } else {
                document.getElementById('custom-remark-deduct-box').style.display = "none";
            }
        };

        // 店家端：📷 模擬掃描功能
        window.startScan = function() {
            let mockUid = prompt("【店員模擬掃描】請輸入客人的 LINE UID (可在老闆娘後台查看複製)：");
            if (!mockUid) return;
            targetUserId = mockUid.trim();
            document.getElementById('customer-name-display').innerText = "🎯 已鎖定用戶：" + targetUserId;
            document.getElementById('staff-status').innerText = "已讀取條碼，請設定點數並輸入密碼後點擊確定。";
        };

        // ==========================================
        // 🛍️ 點數商城與背包功能 (顧客端)
        // ==========================================
        window.toggleAccordion = function(id) {
            const el = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (el.style.display === "block") {
                el.style.display = "none";
                icon.innerText = "➕";
            } else {
                el.style.display = "block";
                icon.innerText = "➖";
            }
        };

        window.openShopModal = async function() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = "<div style='grid-column: span 2; color:#a18b8f;'>正在打開點數商城商品櫃...</div>";
            document.getElementById('shop-overlay').style.display = "flex";
            
            try {
                const qSnapshot = await getDocs(collection(db, "coupons"));
                if (qSnapshot.empty) {
                    grid.innerHTML = "<div style='grid-column: span 2; color:#a18b8f; padding:20px;'>目前商城架上空空如也。</div>";
                    return;
                }
                let html = "";
                qSnapshot.forEach(docSnap => {
                    const cData = docSnap.data();
                    const cid = docSnap.id;
                    html += `
                        <div class="shop-item">
                            <div class="shop-item-title">🎫 ${cData.name}</div>
                            <div class="shop-item-cost">所需點數：<strong>${cData.cost}</strong> 點</div>
                            <button class="shop-exchange-btn" onclick="executeExchangeCoupon('${cid}', '${cData.name.replace(/'/g, "\\'")}', ${cData.cost})">🛒 兌換</button>
                        </div>`;
                });
                grid.innerHTML = html;
            } catch(e) { grid.innerHTML = "<div style='grid-column: span 2; color:red;'>商城載入失敗</div>"; }
        };
        window.closeShopModal = function() { document.getElementById('shop-overlay').style.display = "none"; };

        window.executeExchangeCoupon = async function(cid, cName, cost) {
            if (!currentLiffUserId) return;
            const shopGrid = document.getElementById('shop-grid');
            shopGrid.style.pointerEvents = "none"; 

            try {
                const userDocRef = doc(db, "users", currentLiffUserId);
                const userDocSnap = await getDoc(userDocRef);
                let currentPoints = userDocSnap.exists() ? (userDocSnap.data().totalPoints || 0) : 0;
                
                if (currentPoints < cost) {
                    showCustomAlert("兌換失敗！您的點數餘額不足囉。");
                    shopGrid.style.pointerEvents = "auto";
                    return;
                }

                const now = new Date();
                const expireDate = new Date();
                expireDate.setDate(now.getDate() + 60);

                let newPoints = currentPoints - cost;
                await updateDoc(userDocRef, { totalPoints: newPoints });

                await addDoc(collection(db, "users", currentLiffUserId, "point_log"), {
                    pointsObtained: -cost,
                    obtainedAt: now.toISOString(),
                    expiredAt: now.toISOString(),
                    status: "deducted",
                    remark: `商城兌換: ${cName}`
                });

                await addDoc(collection(db, "users", currentLiffUserId, "coupon_wallet"), {
                    name: cName,
                    exchangedAt: now.toISOString(),
                    expiredAt: expireDate.toISOString(),
                    status: "unused"
                });

                await addDoc(collection(db, "users", currentLiffUserId, "coupon_log"), {
                    name: cName,
                    actionAt: now.toISOString(),
                    type: "exchange",
                    detail: `花費 ${cost} 點兌換成功`
                });

                showCustomAlert(`🎉 成功兌換【${cName}】！\n已自餘額扣除 ${cost} 點，請於 60 天內使用完畢。`);
                document.getElementById('points-display').innerText = newPoints; 
                
                loadPointHistory(currentLiffUserId);
                loadCustomerCouponHistory(currentLiffUserId);
                closeShopModal();
            } catch(e) { showCustomAlert("商城交易失敗，請重試: " + e); }
            finally { shopGrid.style.pointerEvents = "auto"; }
        };

        window.openBagModal = async function() {
            const container = document.getElementById('bag-container');
            container.innerHTML = "<div style='color:#a18b8f;'>正在翻開您的現有優惠券背包...</div>";
            document.getElementById('bag-overlay').style.display = "flex";
            if (!currentLiffUserId) return;

            try {
                const qSnapshot = await getDocs(collection(db, "users", currentLiffUserId, "coupon_wallet"));
                let html = "";
                qSnapshot.forEach(docSnap => {
                    const wData = docSnap.data();
                    if (wData.status !== "unused") return; 
                    const isExpired = new Date() > new Date(wData.expiredAt);
                    if (isExpired) return; 

                    const wid = docSnap.id;
                    html += `
                        <div class="bag-item">
                            <div style="text-align:left;">
                                <div class="bag-item-title">🎫 ${wData.name}</div>
                                <div class="bag-item-date">⏱️ 有效期至: ${new Date(wData.expiredAt).toLocaleDateString()}</div>
                            </div>
                            <button class="bag-use-btn" onclick="executeUseCustomerCoupon('${wid}', '${wData.name.replace(/'/g, "\\'")}')">立即使用</button>
                        </div>`;
                });
                container.innerHTML = html || "<div style='padding:30px; color:#a18b8f;'>您目前口袋空空，快去商城用點數兌換吧！</div>";
            } catch(e) { container.innerHTML = "<div style='color:red;'>背包載入失敗</div>"; }
        };
        window.closeBagModal = function() { document.getElementById('bag-overlay').style.display = "none"; };

        window.executeUseCustomerCoupon = async function(wid, cName) {
            if (!confirm(`確定要立即現場核銷【${cName}】嗎？\n請於店員面前點擊，核銷後此券將會消失！`)) return;
            try {
                const cDocRef = doc(db, "users", currentLiffUserId, "coupon_wallet", wid);
                await updateDoc(cDocRef, { status: "used" });

                await addDoc(collection(db, "users", currentLiffUserId, "coupon_log"), {
                    name: cName,
                    actionAt: new Date().toISOString(),
                    type: "use",
                    detail: "於店面現場成功核銷使用"
                });

                showCustomAlert(`✅【${cName}】核銷成功！\n歡迎再度光臨！`);
                loadCustomerCouponHistory(currentLiffUserId);
                closeBagModal();
            } catch(e) { showCustomAlert("核銷失敗: " + e); }
        };

        async function loadCustomerCouponHistory(userId) {
            const listEl = document.getElementById('coupon-history-list');
            try {
                const q = query(collection(db, "users", userId, "coupon_log"), orderBy("actionAt", "desc"));
                const qSnapshot = await getDocs(q);
                if (qSnapshot.empty) { listEl.innerHTML = "<li>目前尚無任何優惠券兌換使用紀錄</li>"; return; }
                let html = "";
                qSnapshot.forEach(docSnap => {
                    const log = docSnap.data();
                    let typeTxt = log.type === "exchange" ? "🛒 兌換" : "✅ 使用";
                    let color = log.type === "exchange" ? "#c97288" : "#8a7377";
                    html += `<li><strong style="color:${color}">[${typeTxt}] ${log.name}</strong><br><small>${log.detail} (${new Date(log.actionAt).toLocaleDateString()})</small></li>`;
                });
                listEl.innerHTML = html;
            } catch(e) { listEl.innerHTML = "<li>優惠券存摺載入失敗</li>"; }
        }

        // ==========================================
        // 👑 優惠券工廠管理功能 (最高後台)
        // ==========================================
        async function loadBossCouponsMaster() {
            const box = document.getElementById('boss-coupons-master-list');
            box.innerHTML = "<div style='color:#a18b8f; font-size:12px;'>商品架盤點中...</div>";
            try {
                const qSnapshot = await getDocs(collection(db, "coupons"));
                if (qSnapshot.empty) { box.innerHTML = "<p style='font-size:12px; color:#a18b8f;'>目前總商城架上沒有商品。</p>"; return; }
                let html = "";
                qSnapshot.forEach(docSnap => {
                    const cData = docSnap.data();
                    const cid = docSnap.id;
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #fff0f2; background:white; margin-bottom:5px; border-radius:6px; border:1px solid #fcdce2;">
                            <div style="text-align:left; font-size:13px;">
                                <strong style="color:#6e5b5e;">🎫 ${cData.name}</strong><br>
                                <small style="color:#c97288;">兌換代價: ${cData.cost} 點</small>
                            </div>
                            <button class="cancel-point-btn" onclick="showUnpublishCouponModal('${cid}', '${cData.name.replace(/'/g, "\\'")}')">🗑️ 下架</button>
                        </div>`;
                });
                box.innerHTML = html;
            } catch(e) { box.innerHTML = "<p>總名冊盤點失敗</p>"; }
        }

        window.executeAddNewCoupon = async function() {
            const name = document.getElementById('coupon-name-input').value.trim();
            const cost = parseInt(document.getElementById('coupon-cost-input').value);
            if (!name) { showCustomAlert("請輸入優惠券名稱！"); return; }
            if (isNaN(cost) || cost <= 0) { showCustomAlert("所需點數必須大於 0 的數字！"); return; }

            try {
                await addDoc(collection(db, "coupons"), {
                    name: name,
                    cost: cost,
                    createdAt: new Date().toISOString()
                });
                showCustomAlert(`✨ 成功上架【${name}】！`);
                document.getElementById('coupon-name-input').value = "";
                loadBossCouponsMaster();
            } catch(e) { showCustomAlert("上架失敗: " + e); }
        };

        window.showUnpublishCouponModal = function(cid, name) {
            pendingCouponId = cid;
            document.getElementById('unpublish-coupon-msg').innerText = `確定要下架【 ${name} 】嗎？`;
            document.getElementById('unpublish-coupon-overlay').style.display = "flex";
        };
        window.closeUnpublishCouponModal = function() {
            document.getElementById('unpublish-coupon-overlay').style.display = "none";
        };
        window.executeUnpublishCoupon = async function() {
            if (!pendingCouponId) return;
            closeUnpublishCouponModal();
            try {
                await deleteDoc(doc(db, "coupons", pendingCouponId));
                showCustomAlert("該商品已順利下架！");
                loadBossCouponsMaster();
            } catch(e) { showCustomAlert("下架失敗: " + e); }
        };

        // ==========================================
        // 帳務核銷與管理員核心
        // ==========================================
        window.confirmSubmit = async function() {
            if (!targetUserId) { showCustomAlert("請先點擊上方「📷 掃描會員」讀取條碼。"); return; }
            const pointsChange = parseInt(document.getElementById('points-input').value);
            if (pointsChange === 0) { showCustomAlert("點數不能為 0"); return; }
            if (document.getElementById('staff-pass').value !== "0412") { showCustomAlert("管理密碼錯誤！"); return; }

            let finalRemark = "";
            if (pointsChange < 0) {
                if (document.getElementById('rb-deduct-custom').checked) {
                    finalRemark = document.getElementById('custom-remark-deduct-box').value.trim();
                } else if (document.getElementById('rb-deduct-1').checked) {
                    finalRemark = "兌換券";
                } else if (document.getElementById('rb-deduct-2').checked) {
                    finalRemark = "誤發扣除";
                }
                if (!finalRemark) { showCustomAlert("扣點時必須填寫原因！"); return; }
            } else {
                finalRemark = document.getElementById('remark-input-add').value.trim() || "店家發放";
            }

            try {
                const userDocRef = doc(db, "users", targetUserId);
                const userDocSnap = await getDoc(userDocRef);
                let currentPoints = userDocSnap.exists() ? (userDocSnap.data().totalPoints || 0) : 0;
                let newPoints = currentPoints + pointsChange;

                const now = new Date();
                const logRef = collection(db, "users", targetUserId, "point_log");

                if (pointsChange > 0) {
                    const days = parseInt(document.getElementById('custom-days-input').value) || 180;
                    const expireDate = new Date(); expireDate.setDate(now.getDate() + days);
                    await addDoc(logRef, { pointsObtained: pointsChange, obtainedAt: now.toISOString(), expiredAt: expireDate.toISOString(), status: "valid", remark: finalRemark });
                } else {
                    await addDoc(logRef, { pointsObtained: pointsChange, obtainedAt: now.toISOString(), expiredAt: now.toISOString(), status: "deducted", remark: finalRemark });
                }

                await setDoc(userDocRef, { totalPoints: newPoints }, { merge: true });
                showCustomAlert("操作成功！最新餘額：" + newPoints);
                
                targetUserId = ""; 
                document.getElementById('customer-name-display').innerText = "請掃描客戶QR code";
                document.getElementById('points-input').value = "1";
                toggleFormFields(1);
            } catch (e) { showCustomAlert("雲端寫入失敗"); }
        };

        async function loadAllCustomers() {
            const listEl = document.getElementById('boss-customer-list');
            listEl.innerHTML = "<div>正在撈取會員總冊...</div>";
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const uid = String(docSnap.id);
                    html += `
                        <div class="customer-item">
                            <div class="customer-info-row" onclick="toggleCustomerDetails('${uid}')">
                                <span>👤 ${data.lineName || '未命名'}</span>
                                <span class="badge-points">${data.totalPoints || 0} 點</span>
                            </div>
                            <div id="details-${uid}" class="customer-details-box">
                                <p style="font-size:10px;color:#a18b8f;margin:5px 0;">ID: ${uid}</p>
                                <ul id="log-list-${uid}" class="boss-log-list"><li>載入明細中...</li></ul>
                                <button class="delete-user-master-btn" onclick="showDeleteMemberModal('${uid}', '${(data.lineName||'').replace(/'/g,"\\'")}')">❌ 刪除會員</button>
                            </div>
                        </div>`;
                });
                listEl.innerHTML = html || "<p>尚無會員</p>";
            } catch (e) { listEl.innerHTML = "<p>載入失敗</p>"; }
        }

        window.toggleCustomerDetails = async function(uid) {
            const box = document.getElementById(`details-${uid}`);
            box.style.display = box.style.display === "block" ? "none" : "block";
            if (box.style.display !== "block") return;

            const logListEl = document.getElementById(`log-list-${uid}`);
            try {
                const q = query(collection(db, "users", uid, "point_log"), orderBy("obtainedAt", "desc"));
                const querySnapshot = await getDocs(q);
                let html = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const logId = docSnap.id;
                    let isCanceled = data.status === "canceled";
                    html += `
                        <li style="display:flex; justify-content:space-between; margin-bottom:5px; ${isCanceled ? 'text-decoration:line-through;color:#aaa;':''}">
                            <div><strong>${data.pointsObtained}點</strong> (${data.remark})</div>
                            ${!isCanceled ? `<button class="cancel-point-btn" onclick="showCancelConfirmModal('${uid}', '${logId}', ${data.pointsObtained})">註銷</button>` : '<span>已註銷</span>'}
                        </li>`;
                });
                logListEl.innerHTML = html || "<li>無紀錄</li>";
            } catch (e) { logListEl.innerHTML = "<li>加載失敗</li>"; }
        };

        window.showCancelConfirmModal = function(uid, logId, val) {
            pendingCancel = { uid, logId, pointsValue: val };
            document.getElementById('cancel-confirm-overlay').style.display = "flex";
        };
        window.closeCancelConfirmModal = function() { document.getElementById('cancel-confirm-overlay').style.display = "none"; };
        window.executeCancelPoint = async function() {
            closeCancelConfirmModal();
            try {
                await updateDoc(doc(db, "users", pendingCancel.uid, "point_log", pendingCancel.logId), { status: "canceled" });
                const uRef = doc(db, "users", pendingCancel.uid);
                const uSnap = await getDoc(uRef);
                if (uSnap.exists()) {
                    await updateDoc(uRef, { totalPoints: (uSnap.data().totalPoints || 0) - pendingCancel.pointsValue });
                }
                showCustomAlert("註銷成功");
                loadAllCustomers();
            } catch (e) { showCustomAlert("註銷失敗"); }
        };

        window.showDeleteMemberModal = function(uid, name) {
            pendingDeleteUid = uid;
            document.getElementById('delete-member-msg').innerText = `確定要永久刪除會員【${name}】嗎？`;
            document.getElementById('delete-member-overlay').style.display = "flex";
        };
        window.closeDeleteMemberModal = function() { document.getElementById('delete-member-overlay').style.display = "none"; };
        window.executeDeleteMember = async function() {
            if (document.getElementById('delete-confirm-input').value.trim() !== "del") { showCustomAlert("密碼錯誤"); return; }
            closeDeleteMemberModal();
            try {
                await deleteDoc(doc(db, "users", pendingDeleteUid));
                showCustomAlert("刪除成功");
                loadAllCustomers();
            } catch (e) { showCustomAlert("刪除失敗"); }
        };

        window.loadAllCustomers = loadAllCustomers;
        window.loadBossCouponsMaster = loadBossCouponsMaster;
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: #fffbfc; padding: 15px 10px; color: #5c4d50; touch-action: manipulation; }
        .card { background-color: #fff5f6; border-radius: 16px; padding: 24px; width: 95%; max-width: 360px; margin: 0 auto 20px auto; box-shadow: 0 4px 20px rgba(240, 210, 215, 0.25); box-sizing: border-box; }
        h1, h2, h3 { color: #c97288; font-size: 24px; margin: 5px 0; font-weight: bold; user-select: none; -webkit-user-select: none; }
        .user-name { font-size: 18px; font-weight: bold; margin: 12px 0; color: #6e5b5e; }
        .points-section { background-color: white; border: 2px dashed #fcdce2; border-radius: 12px; padding: 12px; margin: 18px 0; }
        .points-num { font-size: 46px; font-weight: bold; color: #c97288; }
        .qrcode-section { margin: 20px auto; padding: 12px; background: #fff; width: 180px; height: 180px; box-shadow: 0 4px 12px rgba(240, 210, 215, 0.2); border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        
        .shop-btn-row { display: flex; gap: 10px; margin: 15px 0; justify-content: center; }
        .action-mall-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 3px 8px rgba(240,210,215,0.3); }
        .btn-pink-shop { background: #c97288; color: white; }
        .btn-white-bag { background: white; color: #c97288; border: 1px solid #c97288; }

        .accordion-btn { width: 100%; max-width: 360px; margin: 0 auto 8px auto; padding: 12px 16px; background: white; border: 1px solid #fcdce2; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #6e5b5e; cursor: pointer; box-sizing: border-box; }
        .accordion-content { display: none; background-color: #fff5f6; border-radius: 16px; padding: 18px; width: 95%; max-width: 360px; margin: 0 auto 15px auto; text-align: left; box-sizing: border-box; }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px; max-height: 300px; overflow-y: auto; }
        .shop-item { background: #fffbfc; border: 1px solid #fcdce2; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .shop-item-title { font-weight: bold; color: #5c4d50; font-size: 13px; margin-bottom: 5px; text-align: center; }
        .shop-item-cost { font-size: 11px; color: #8a7377; }
        .shop-exchange-btn { width: 100%; padding: 6px; background: #ffeef0; color: #c97288; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; margin-top: 5px; }

        .bag-list { max-height: 300px; overflow-y: auto; padding: 5px; }
        .bag-item { background: #fffbfc; border: 1px solid #fcdce2; border-radius: 10px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .bag-item-title { font-weight: bold; color: #5c4d50; font-size: 13px; }
        .bag-item-date { font-size: 11px; color: #a18b8f; }
        .bag-use-btn { padding: 6px 12px; background: #c97288; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; }

        .factory-box { background: #fff5f6; padding: 15px; border-radius: 12px; border: 1px dashed #c97288; margin-top: 20px; text-align: left; }
        .history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; font-size: 13px; }
        .history-list li { padding: 8px 0; border-bottom: 1px solid #fff0f2; color: #6e5b5e; }
        .scan-btn { width: 100%; padding: 15px; background-color: #ffeef0; color: #c97288; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .status-box { background: white; border-left: 4px solid #ffeef0; padding: 10px; font-size: 13px; text-align: left; color: #8a7377; }
        .panel { display: block; border-top: 1px dashed #fcdce2; padding-top: 15px; text-align: left; }
        .counter-box { display: flex; align-items: center; }
        .btn-counter { width: 45px; height: 40px; background: white; border: 1px solid #fcdce2; font-size: 20px; font-weight: bold; color: #c97288; }
        .input-points { width: 70px; height: 40px; text-align: center; font-size: 18px; border: 1px solid #fcdce2; font-weight: bold; color: #c97288; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .radio-btn { background: white; border: 1px solid #fcdce2; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #8a7377; }
        .radio-btn input { display: none; }
        .radio-btn:has(input:checked) { background: #ffeef0; color: #c97288; border-color: #fcdce2; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #fcdce2; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .submit-btn { width: 100%; padding: 14px; background-color: #ffeef0; color: #c97288; border: none; font-size: 16px; font-weight: bold; margin-top: 15px; border-radius: 10px; }
        .customer-list-container { text-align: left; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .customer-item { background: white; border: 1px solid #fcdce2; border-radius: 10px; margin-bottom: 8px; padding: 10px; }
        .customer-info-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .badge-points { background: #ffeef0; color: #c97288; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .customer-details-box { display: none; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #fcdce2; }
        .boss-log-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
        .cancel-point-btn { background: #fff0f2; color: #d9534f; border: 1px solid #fcdce2; padding: 2px 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .delete-user-master-btn { width: 100%; margin-top: 10px; padding: 8px; background-color: #fff0f1; color: #d9534f; border: 1px dashed #fcdce2; border-radius: 6px; font-size: 11px; }
        .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .custom-alert-box { background: white; padding: 20px; border-radius: 16px; max-width: 300px; width: 100%; text-align: center; }
        .custom-alert-text { font-size: 15px; font-weight: bold; color: #5c4d50; margin-bottom: 15px; }
        .custom-alert-btn { background: #ffeef0; color: #c97288; border: none; padding: 10px; font-size: 14px; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: white; padding: 20px; border-radius: 16px; max-width: 320px; width: 100%; text-align: center; }
        .modal-title { font-size: 17px; font-weight: bold; color: #c97288; margin-bottom: 12px; }
        .modal-text { font-size: 13px; color: #6e5b5e; margin-bottom: 15px; }
        .modal-btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn-cancel { flex: 1; background: #fff; color: #a18b8f; border: 1px solid #fcdce2; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .modal-btn-confirm { flex: 1; background: #ffeef0; color: #c97288; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .modal-btn-danger-confirm { flex: 1; background: #d9534f; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="customer-view" style="display:none;">
        <div class="card">
            <h1 onclick="handleCustomerTitleClick()" style="cursor: pointer;">集點卡</h1>
            <div id="username" class="user-name">載入中...</div>
            <div class="points-section">
                <p style="margin:0; color:#8a7377; font-size: 14px;">目前可用總點數</p>
                <div id="points-display" class="points-num">--</div>
            </div>
            
            <div class="shop-btn-row">
                <button class="action-mall-btn btn-pink-shop" onclick="openShopModal()">🛍️ 點數兌換商城</button>
                <button class="action-mall-btn btn-white-bag" onclick="openBagModal()">🎫 我的現有優惠券</button>
            </div>
            
            <p style="font-size:12px; color:#c97288; font-weight:bold; margin-top:5px;">請出示下方條碼給店家掃描</p>
            <div id="qrcode" class="qrcode-section"></div>
        </div>
        
        <div class="accordion-btn" onclick="toggleAccordion('points-accordion-box')">
            <span>📊 點數收支歷史紀錄</span><span id="points-accordion-box-icon">➕</span>
        </div>
        <div id="points-accordion-box" class="accordion-content">
            <ul id="history-list" class="history-list"><li>載入中...</li></ul>
        </div>

        <div class="accordion-btn" onclick="toggleAccordion('coupon-accordion-box')">
            <span>🎁 優惠券兌換歷史紀錄</span><span id="coupon-accordion-box-icon">➕</span>
        </div>
        <div id="coupon-accordion-box" class="accordion-content">
            <ul id="coupon-history-list" class="history-list"><li>尚無兌換紀錄</li></ul>
        </div>
    </div>

    <div id="staff-view" style="display:none;" class="card">
        <h2 onclick="handleStaffTitleClick()" style="cursor: pointer;">店家管理後台</h2>
        <div id="staff-status" class="status-box">請點擊下方按鈕開始掃描。</div>
        <button class="scan-btn" onclick="startScan()">📷 掃描會員</button>
        
        <div id="action-panel" class="panel">
            <div style="background:white; padding:10px; font-weight:bold; color: #c97288; border: 1px solid #fcdce2; border-radius: 6px; text-align: center;" id="customer-name-display">請掃描客戶QR code</div>
            <div style="margin: 15px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">發放/扣除點數：</label>
                <div class="counter-box">
                    <button class="btn-counter" onclick="changePoints(-1)">-</button>
                    <input type="number" id="points-input" class="input-points" value="1">
                    <button class="btn-counter" onclick="changePoints(1)">+</button>
                </div>
            </div>
            
            <div id="expiry-group" style="margin: 15px 0;">
                <label style="font-weight:bold;">點數有效期限：</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" name="expiry" onclick="setExpireDays(180)" checked>6 個月</label>
                    <label class="radio-btn"><input type="radio" name="expiry" onclick="setExpireDays('custom')">自訂天數</label>
                </div>
                <input type="number" id="custom-days-input" value="180" style="display:none; margin-top:8px;">
            </div>
            
            <div id="remark-add-group" style="margin: 15px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">異動備註：</label>
                <input type="text" id="remark-input-add" placeholder="例如：消費滿百、活動贈點">
            </div>
            
            <div id="remark-deduct-group" style="margin: 15px 0; display:none;">
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">扣除原因(必選)：</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" id="rb-deduct-1" name="deduct_remark" onclick="setDeductRemark('兌換券')" checked>兌換券</label>
                    <label class="radio-btn"><input type="radio" id="rb-deduct-2" name="deduct_remark" onclick="setDeductRemark('誤發扣除')">誤發扣除</label>
                    <label class="radio-btn"><input type="radio" id="rb-deduct-custom" name="deduct_remark" onclick="setDeductRemark('custom')">手動輸入</label>
                </div>
                <input type="text" id="custom-remark-deduct-box" placeholder="請手動填寫特殊扣除原因" style="display:none; margin-top:8px;">
            </div>
            
            <div style="margin: 15px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 5px;">管理員密碼：</label>
                <input type="password" id="staff-pass" placeholder="請輸入後台密碼">
            </div>
            <div style="margin-top: 15px;">
                <button id="staff-submit-btn" class="submit-btn" onclick="confirmSubmit()">確定</button>
            </div>
        </div>
    </div>

    <div id="boss-view" style="display:none;" class="card">
        <h2>最美老闆娘後台系統</h2>
        <button class="scan-btn" onclick="loadAllCustomers(); loadBossCouponsMaster();">🔄 重新整理全店總冊</button>
        <div id="boss-customer-list" class="customer-list-container"></div>

        <div class="factory-box">
            <h3 style="font-size:16px; color:#c97288; margin-top:0; border-bottom:1px dashed #fcdce2; padding-bottom:6px;">🏭 優惠券商城上架櫃台</h3>
            <div style="margin-bottom: 10px;">
                <label style="font-size:12px; font-weight:bold; color:#6e5b5e;">1. 輸入商品名稱：</label>
                <input type="text" id="coupon-name-input" placeholder="例如：大杯美式免費兌換券">
            </div>
            <div style="margin-bottom: 12px;">
                <label style="font-size:12px; font-weight:bold; color:#6e5b5e;">2. 設定所需兌換點數：</label>
                <input type="number" id="coupon-cost-input" value="10">
            </div>
            <button class="submit-btn" style="margin:0; padding:10px;" onclick="executeAddNewCoupon()">✨ 立即一鍵上架</button>
            <h4 style="font-size:13px; color:#8a7377; margin:15px 0 8px 0;">📋 目前架上商品總冊：</h4>
            <div id="boss-coupons-master-list"></div>
        </div>
    </div>

    <div id="shop-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">🛍️ 點數兌換商城</div>
            <div id="shop-grid" class="shop-grid"></div>
            <button class="modal-btn-cancel" style="width:100%; margin-top:15px;" onclick="closeShopModal()">關閉商城</button>
        </div>
    </div>

    <div id="bag-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">🎫 我的現有優惠券</div>
            <div id="bag-container" class="bag-list"></div>
            <button class="modal-btn-cancel" style="width:100%; margin-top:15px;" onclick="closeBagModal()">關閉口袋</button>
        </div>
    </div>

    <div id="custom-alert-overlay" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="alert-msg" class="custom-alert-text">提示訊息</div>
            <button class="custom-alert-btn" onclick="closeCustomAlert()">確定</button>
        </div>
    </div>

    <div id="boss-login-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">輸入密碼</div>
            <input type="password" id="boss-pass-input" placeholder="請輸入最高驗證碼">
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeBossLoginModal()">取消</button>
                <button class="modal-btn-confirm" onclick="confirmBossLogin()">解鎖系統</button>
            </div>
        </div>
    </div>

    <div id="cancel-confirm-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">最高權限操作</div>
            <div class="modal-text">確定要註銷這筆紀錄嗎？</div>
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeCancelConfirmModal()">拒絕</button>
                <button class="modal-btn-confirm" onclick="executeCancelPoint()">確定註銷</button>
            </div>
        </div>
    </div>

    <div id="delete-member-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" style="color: #d9534f;">🚨 永久刪除會員</div>
            <div id="delete-member-msg" class="modal-text">確認刪除訊息</div>
            <input type="text" id="delete-confirm-input" placeholder="請精準輸入 del">
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeDeleteMemberModal()">取消</button>
                <button class="modal-btn-danger-confirm" onclick="executeDeleteMember()">強行永久刪除</button>
            </div>
        </div>
    </div>

    <div id="unpublish-coupon-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">📋 下架商品確認</div>
            <div id="unpublish-coupon-msg" class="modal-text"></div>
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeUnpublishCouponModal()">取消</button>
                <button class="modal-btn-confirm" style="background:#c97288; color:white;" onclick="executeUnpublishCoupon()">確定移除下架</button>
            </div>
        </div>
    </div>

</body>
</html>
