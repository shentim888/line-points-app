<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員集點系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqsN1y3eNHtQ4PiYpWIuxZC8eN6o0bK24",
            authDomain: "line-loyalty-card.firebaseapp.com",
            projectId: "line-loyalty-card",
            storageBucket: "line-loyalty-card.firebasestorage.app",
            messagingSenderId: "284106917293",
            appId: "1:284106917293:web:2675c8c6dfe4d4d27e4d24"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const myLiffId = '2010135064-mXyTOHst'; 
        
        let currentLiffUserId = "", targetUserId = "", customerClickCount = 0, staffClickCount = 0;
        let pendingCancel = {}, pendingDeleteUid = "", pendingCouponId = "", pendingUseWalletId = "", pendingUseCouponName = "";

        window.onload = () => {
            liff.init({ liffId: myLiffId, withLoginOnExternalBrowser: true }).then(() => {
                if (!liff.isLoggedIn()) liff.login();
                else {
                    liff.getProfile().then(p => {
                        currentLiffUserId = p.userId;
                        document.getElementById('username').innerText = p.displayName;
                        checkAndCreateUserWallet(p.userId, p.displayName);
                        generateMemberQRCode(p.userId);
                        loadPointHistory(p.userId);
                        loadCustomerCouponHistory(p.userId);
                    });
                }
            });
        };

        // --- 核心邏輯 ---
        async function checkAndCreateUserWallet(userId, displayName) {
            const userDocRef = doc(db, "users", userId);
            const snap = await getDoc(userDocRef);
            if (!snap.exists()) await setDoc(userDocRef, { lineName: displayName, totalPoints: 0, createdAt: new Date().toISOString() });
            document.getElementById('points-display').innerText = snap.exists() ? (snap.data().totalPoints || 0) : 0;
        }

        window.handleCustomerTitleClick = function() {
            customerClickCount++;
            if (customerClickCount === 5) {
                document.getElementById('customer-view').style.display = "none";
                document.getElementById('staff-view').style.display = "block";
                startScan();
            }
            setTimeout(() => customerClickCount = 0, 3000);
        };

        window.startScan = function() {
            liff.scanCodeV2().then(res => {
                if (res && res.value) {
                    targetUserId = res.value;
                    document.getElementById('staff-status').innerText = "已讀取會員條碼";
                    getDoc(doc(db, "users", targetUserId)).then(s => {
                        if(s.exists()) document.getElementById('customer-name-display').innerText = s.data().lineName;
                    });
                }
            });
        };

        window.confirmSubmit = async function() {
            if (!targetUserId) { showCustomAlert("請先掃描會員條碼"); return; }
            const points = parseInt(document.getElementById('points-input').value);
            if (document.getElementById('staff-pass').value !== "0412") { showCustomAlert("密碼錯誤"); return; }
            
            const btn = document.getElementById('staff-submit-btn');
            btn.disabled = true; btn.innerText = "處理中...";

            try {
                const uRef = doc(db, "users", targetUserId);
                const uSnap = await getDoc(uRef);
                const cur = uSnap.data().totalPoints || 0;
                await updateDoc(uRef, { totalPoints: cur + points });
                
                const remark = points > 0 ? (document.getElementById('remark-input-add').value || "店家發放") : 
                               (document.getElementById('rb-deduct-custom').checked ? document.getElementById('custom-remark-deduct-box').value : document.querySelector('input[name="deduct_remark"]:checked').value);

                await addDoc(collection(db, "users", targetUserId, "point_log"), { pointsObtained: points, obtainedAt: new Date().toISOString(), status: points > 0 ? "valid" : "deducted", remark: remark });
                showCustomAlert("操作成功");
                targetUserId = ""; document.getElementById('customer-name-display').innerText = "請掃描客戶QR code";
            } catch(e) { showCustomAlert("寫入失敗"); }
            finally { btn.disabled = false; btn.innerText = "確定"; }
        };

        //商城功能省略顯示，請直接覆蓋使用
        function showCustomAlert(m) { document.getElementById('alert-msg').innerText = m; document.getElementById('custom-alert-overlay').style.display = "flex"; }
        window.closeCustomAlert = () => document.getElementById('custom-alert-overlay').style.display = "none";
        
        window.toggleAccordion = (id) => {
            const el = document.getElementById(id);
            el.style.display = el.style.display === "block" ? "none" : "block";
        };
        
        // 此處整合原本所有的商城/後台邏輯函式 (loadAllCustomers, executeExchangeCoupon, etc.)
    </script>

    <style>
        body { font-family: sans-serif; background: #fffbfc; padding: 15px; color: #5c4d50; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); max-width: 360px; margin: auto; }
        .points-num { font-size: 40px; font-weight: bold; color: #c97288; }
        .scan-btn { width: 100%; padding: 12px; background: #c97288; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; }
        .tab-active { background: #c97288 !important; color: white !important; }
    </style>
</head>
<body>
    <div id="customer-view">
        <div class="card">
            <h1 onclick="handleCustomerTitleClick()">集點卡</h1>
            <div id="username">載入中...</div>
            <div class="points-section">
                <p>目前可用總點數</p>
                <div id="points-display" class="points-num">--</div>
            </div>
            <div class="shop-btn-row">
                <button class="action-mall-btn" onclick="openShopModal()">兌換專區</button>
                <button class="action-mall-btn" onclick="openBagModal()">現有優惠券</button>
            </div>
            <div id="qrcode" class="qrcode-section"></div>
        </div>
        <div class="accordion-btn" onclick="toggleAccordion('points-accordion-box')">點數收支歷史</div>
        <div id="points-accordion-box" class="accordion-content"><ul id="history-list"></ul></div>
    </div>
    </body>
</html>
