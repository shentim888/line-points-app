<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員集點系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, where, getDocs, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqsN1y3eNHtQ4PiYpWIuxZC8eN6o0bK24",
            authDomain: "line-loyalty-card.firebaseapp.com",
            projectId: "line-loyalty-card",
            storageBucket: "line-loyalty-card.firebasestorage.app",
            messagingSenderId: "284106917293",
            appId: "1:284106917293:web:2675c8c6dfe4d4d27e4d24"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const myLiffId = '2010135064-mXyTOHst'; 
        let targetUserId = ""; 
        let customerClickCount = 0; 
        let staffClickCount = 0;    
        let pendingCancel = {}; 
        let pendingDeleteUid = ""; 

        window.onload = function() {
            liff.init({ liffId: myLiffId, withLoginOnExternalBrowser: true })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        document.getElementById('customer-view').style.display = "block";
                        document.getElementById('staff-view').style.display = "none";
                        document.getElementById('boss-view').style.display = "none";
                        
                        liff.getProfile().then(profile => {
                            document.getElementById('username').innerText = "嗨！ " + profile.displayName;
                            document.getElementById('username').classList.remove('loading');
                            checkAndCreateUserWallet(profile.userId, profile.displayName);
                            generateMemberQRCode(profile.userId);
                            loadPointHistory(profile.userId);
                        });
                    }
                })
                .catch(err => showCustomAlert("系統連線失敗，請重開 LINE 再試。"));
        };

        // 階梯分流第一層
        function handleCustomerTitleClick() {
            customerClickCount++;
            if (customerClickCount === 5) {
                customerClickCount = 0; 
                document.getElementById('customer-view').style.display = "none";
                document.getElementById('boss-view').style.display = "none";
                document.getElementById('staff-view').style.display = "block";
                
                // 【核心修正點】：進後台時，僅更新狀態提示文字，不呼叫啟動相機的 startScan()
                document.getElementById('staff-status').innerText = "請點擊下方按鈕開始掃描。";
                
                // 常駐面板狀態初始化
                targetUserId = ""; 
                document.getElementById('customer-name-display').innerText = "請掃描客戶QR code";
                toggleFormFields(1); 
                
                showCustomAlert("切換至店家管理後台");
            }
            setTimeout(() => { customerClickCount = 0; }, 3000); 
        }

        // 階梯分流第二層
        function handleStaffTitleClick() {
            staffClickCount++;
            if (staffClickCount === 5) {
                staffClickCount = 0; 
                showBossLoginModal(); 
            }
            setTimeout(() => { staffClickCount = 0; }, 3000); 
        }

        function showCustomAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert-overlay').style.display = "flex";
        }
        function closeCustomAlert() {
            document.getElementById('custom-alert-overlay').style.display = "none";
        }

        // 老闆娘登入
        function showBossLoginModal() {
            document.getElementById('boss-pass-input').value = ""; 
            document.getElementById('boss-login-overlay').style.display = "flex";
            document.getElementById('boss-pass-input').focus(); 
        }
        function closeBossLoginModal() {
            document.getElementById('boss-login-overlay').style.display = "none";
        }
        function confirmBossLogin() {
            const bossPass = document.getElementById('boss-pass-input').value;
            if (bossPass === "0412888") {
                closeBossLoginModal();
                document.getElementById('customer-view').style.display = "none";
                document.getElementById('staff-view').style.display = "none";
                document.getElementById('boss-view').style.display = "block";
                showCustomAlert("歡迎最美老闆娘登入最高階系統");
                loadAllCustomers(); 
            } else {
                closeBossLoginModal(); 
                setTimeout(() => { showCustomAlert("密碼錯誤，請重新解鎖。"); }, 300); 
            }
        }

        // 註銷確認框
        function showCancelConfirmModal(uid, logId, pointsValue) {
            pendingCancel = { 
                uid: String(uid), 
                logId: String(logId), 
                pointsValue: parseInt(pointsValue) 
            };
            document.getElementById('cancel-confirm-msg').innerText = `確定要註銷這筆 [ ${pointsValue > 0 ? '+'+pointsValue : pointsValue} 點 ] 的紀錄嗎？\n系統將自動自該會員總餘額扣除或補回！`;
            document.getElementById('cancel-confirm-overlay').style.display = "flex";
        }
        function closeCancelConfirmModal() {
            document.getElementById('cancel-confirm-overlay').style.display = "none";
            pendingCancel = {}; 
        }
        
        // 執行註銷點數
        async function executeCancelPoint() {
            if (!pendingCancel.uid || !pendingCancel.logId) {
                showCustomAlert("系統地址解析失敗，請重新整理著名冊再試。");
                closeCancelConfirmModal();
                return;
            }
            
            const targetUid = pendingCancel.uid;
            const targetLogId = pendingCancel.logId;
            const pVal = pendingCancel.pointsValue;
            
            closeCancelConfirmModal(); 
            
            try {
                const logDocRef = doc(db, "users", targetUid, "point_log", targetLogId);
                await updateDoc(logDocRef, { status: "canceled" });
                
                const userDocRef = doc(db, "users", targetUid);
                const userDocSnap = await getDoc(userDocRef);
                if (userDocSnap.exists()) {
                    let currentTotal = userDocSnap.data().totalPoints || 0;
                    let newTotal = currentTotal - pVal;
                    await updateDoc(userDocRef, { totalPoints: newTotal });
                }
                
                setTimeout(() => {
                    showCustomAlert("點數已順利註銷且餘額重算完畢。");
                    loadAllCustomers(); 
                }, 300); 

            } catch (e) { 
                console.error(e);
                setTimeout(() => { showCustomAlert("權限寫入失敗，請確認 Firebase 索引是否建立完成。"); }, 300);
            }
        }

        // 永久刪除會員
        function showDeleteMemberModal(uid, name) {
            pendingDeleteUid = String(uid); 
            document.getElementById('delete-member-msg').innerText = `⚠️ 警告：您即將永久刪除會員【 ${name} 】！\n此操作將一併刪除該會員的所有歷史點數且無法復原。`;
            document.getElementById('delete-confirm-input').value = ""; 
            document.getElementById('delete-member-overlay').style.display = "flex";
        }
        function closeDeleteMemberModal() {
            document.getElementById('delete-member-overlay').style.display = "none";
            pendingDeleteUid = "";
        }
        
        async function executeDeleteMember() {
            const inputTxt = document.getElementById('delete-confirm-input').value.trim();
            if (inputTxt !== "del") {
                showCustomAlert("防呆驗證碼輸入錯誤，取消刪除操作！");
                return;
            }
            if (!pendingDeleteUid || pendingDeleteUid === "undefined") {
                showCustomAlert("系統偵測到會員編號遺失，請重新點擊名冊再試。");
                return;
            }

            const activeDeleteUid = pendingDeleteUid; 
            closeDeleteMemberModal(); 

            try {
                const logRef = collection(db, "users", activeDeleteUid, "point_log");
                const querySnapshot = await getDocs(logRef);
                for (const docSnap of querySnapshot.docs) {
                    await deleteDoc(doc(db, "users", activeDeleteUid, "point_log", docSnap.id));
                }
                await deleteDoc(doc(db, "users", activeDeleteUid));

                setTimeout(() => {
                    showCustomAlert("該會員資料已從雲端全面永久刪除！");
                    loadAllCustomers(); 
                }, 300);

            } catch (e) {
                console.error("刪除時發生錯誤: ", e);
                setTimeout(() => { showCustomAlert("權限刪除失敗: " + e.message); }, 300);
            }
        }

        // 載入顧客資料
        async function checkAndCreateUserWallet(userId, userName) {
            const pointsEl = document.getElementById('points-display');
            try {
                const userDocRef = doc(db, "users", userId);
                const userDocSnap = await getDoc(userDocRef);
                if (userDocSnap.exists()) {
                    pointsEl.innerText = userDocSnap.data().totalPoints || 0;
                } else {
                    await setDoc(userDocRef, { lineName: userName, totalPoints: 0, createdAt: new Date().toISOString() });
                    pointsEl.innerText = 0;
                }
            } catch (e) { console.error(e); }
        }

        function generateMemberQRCode(userId) {
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: userId, width: 180, height: 180 });
        }

        async function loadPointHistory(userId) {
            const historyListEl = document.getElementById('history-list');
            try {
                const logRef = collection(db, "users", userId, "point_log");
                const q = query(logRef, orderBy("obtainedAt", "desc"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) { historyListEl.innerHTML = "<li>目前尚無點數歷史紀錄</li>"; return; }
                
                let htmlContent = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.status === "used") return; 

                    let statusTxt = "有效";
                    if (data.status === "deducted") statusTxt = "已扣除";
                    if (data.status === "canceled") statusTxt = "已註銷";
                    if (data.status === "valid" && new Date() > new Date(data.expiredAt)) statusTxt = "已過期";

                    let pointStr = data.pointsObtained > 0 ? `+${data.pointsObtained}` : `${data.pointsObtained}`;
                    let dateInfo = `發放日: ${new Date(data.obtainedAt).toLocaleDateString()}`;
                    
                    if (data.status !== "deducted" && data.status !== "canceled") {
                        dateInfo += ` | 到期日: ${new Date(data.expiredAt).toLocaleDateString()}`;
                    } else {
                        dateInfo = `異動日: ${new Date(data.obtainedAt).toLocaleDateString()}`;
                    }

                    htmlContent += `<li><strong>${pointStr} 點</strong> - ${statusTxt}${data.remark ? ' ('+data.remark+')' : ''}<br><small>${dateInfo}</small></li>`;
                });
                historyListEl.innerHTML = htmlContent || "<li>目前尚無有效的點數歷史紀錄</li>";
            } catch (e) { historyListEl.innerHTML = "<li>明細載入失敗</li>"; }
        }

        // 只有點選此按鈕，才會受控啟動相機
        function startScan() {
            document.getElementById('staff-status').innerText = "安全連線中，正在喚醒相機...";
            liff.scanCodeV2()
                .then(result => {
                    if (result && result.value) {
                        targetUserId = result.value;
                        document.getElementById('staff-status').innerText = "掃描成功！已順利綁定會員。";
                        fetchCustomerInfo(targetUserId);
                    }
                })
                .catch(err => {
                    showCustomAlert("相機喚醒失敗，請確認是否允許 LINE 相機權限。");
                });
        }

        async function fetchCustomerInfo(uid) {
            try {
                const userDocRef = doc(db, "users", uid);
                const userDocSnap = await getDoc(userDocRef);
                if (userDocSnap.exists()) {
                    const data = userDocSnap.data();
                    document.getElementById('customer-name-display').innerText = `${data.lineName} (餘額: ${data.totalPoints || 0} 點)`;
                } else {
                    document.getElementById('customer-name-display').innerText = "未開戶新客";
                }
            } catch (e) { document.getElementById('customer-name-display').innerText = "讀取失敗"; }
        }

        function changePoints(amount) {
            const input = document.getElementById('points-input');
            let next = (parseInt(input.value) || 0) + amount;
            input.value = next;
            toggleFormFields(next);
        }

        function toggleFormFields(value) {
            const expiryGroup = document.getElementById('expiry-group');
            const remarkAddGroup = document.getElementById('remark-add-group');
            const remarkDeductGroup = document.getElementById('remark-deduct-group');
            
            if (value < 0) {
                expiryGroup.style.display = "none";
                remarkAddGroup.style.display = "none";
                remarkDeductGroup.style.display = "block"; 
                setDeductRemark('兌換券'); 
                document.getElementById('rb-deduct-1').checked = true;
            } else {
                expiryGroup.style.display = "block";
                remarkAddGroup.style.display = "block"; 
                remarkDeductGroup.style.display = "none";
                document.getElementById('remark-input-add').value = ""; 
            }
        }

        function setExpireDays(days) {
            document.getElementById('custom-days-input').style.display = days === 'custom' ? "block" : "none";
            document.getElementById('custom-days-input').value = days === 'custom' ? "30" : days;
        }

        function setDeductRemark(type) {
            const customBox = document.getElementById('custom-remark-deduct-box');
            if (type === 'custom') {
                customBox.style.display = "block";
                customBox.value = "";
                customBox.focus();
            } else {
                customBox.style.display = "none";
                customBox.value = type; 
            }
        }

        // 核心提交
        async function confirmSubmit() {
            if (!targetUserId) {
                showCustomAlert("操作失敗！請先點擊上方「📷 掃描會員」讀取客人的條碼。");
                return;
            }

            const submitBtn = document.getElementById('staff-submit-btn');
            if (submitBtn.disabled) return;

            const pointsChange = parseInt(document.getElementById('points-input').value);
            if (pointsChange === 0) { showCustomAlert("點數不能為 0"); return; }
            if (document.getElementById('staff-pass').value !== "0412") { showCustomAlert("管理密碼錯誤！"); return; }

            let finalRemark = "";
            if (pointsChange < 0) {
                if (document.getElementById('rb-deduct-custom').checked) {
                    finalRemark = document.getElementById('custom-remark-deduct-box').value.trim();
                } else if (document.getElementById('rb-deduct-1').checked) {
                    finalRemark = "兌換券";
                } else if (document.getElementById('rb-deduct-2').checked) {
                    finalRemark = "誤發扣除";
                }
                if (!finalRemark) { showCustomAlert("扣點時，必須選擇或填寫原因！"); return; }
            } else {
                finalRemark = document.getElementById('remark-input-add').value.trim() || "店家發放";
            }

            // 鎖定按鈕，防止重複連點
            submitBtn.disabled = true;
            submitBtn.innerText = "雲端同步中...";
            submitBtn.classList.add('btn-disabled');

            try {
                const userDocRef = doc(db, "users", targetUserId);
                const userDocSnap = await getDoc(userDocRef);
                let currentPoints = userDocSnap.exists() ? (userDocSnap.data().totalPoints || 0) : 0;
                let newPoints = currentPoints + pointsChange;

                const now = new Date();
                const logRef = collection(db, "users", targetUserId, "point_log");

                if (pointsChange > 0) {
                    const days = parseInt(document.getElementById('custom-days-input').value) || 180;
                    const expireDate = new Date(); expireDate.setDate(now.getDate() + days);
                    await addDoc(logRef, { pointsObtained: pointsChange, obtainedAt: now.toISOString(), expiredAt: expireDate.toISOString(), status: "valid", remark: finalRemark });
                } else {
                    let pointsToDeduct = Math.abs(pointsChange);
                    const q = query(logRef, where("status", "==", "valid"), orderBy("obtainedAt", "asc"));
                    const querySnapshot = await getDocs(q);
                    for (const pointDoc of querySnapshot.docs) {
                        if (pointsToDeduct <= 0) break;
                        const pointData = pointDoc.data();
                        if (new Date() > new Date(pointData.expiredAt)) continue;
                        const singleDocRef = doc(db, "users", targetUserId, "point_log", pointDoc.id);
                        if (pointData.pointsObtained <= pointsToDeduct) {
                            pointsToDeduct -= pointData.pointsObtained;
                            await setDoc(singleDocRef, { status: "used" }, { merge: true });
                        } else {
                            await setDoc(singleDocRef, { status: "used", pointsObtained: pointsToDeduct }, { merge: true });
                            await addDoc(logRef, { pointsObtained: pointData.pointsObtained - pointsToDeduct, obtainedAt: pointData.obtainedAt, expiredAt: pointData.expiredAt, status: "valid", remark: "拆分剩餘" });
                            pointsToDeduct = 0;
                        }
                    }
                    await addDoc(logRef, { pointsObtained: pointsChange, obtainedAt: now.toISOString(), expiredAt: now.toISOString(), status: "deducted", remark: finalRemark });
                }

                await setDoc(userDocRef, { totalPoints: newPoints }, { merge: true });
                showCustomAlert("操作成功！最新餘額：" + newPoints);
                
                // 成功後重置
                targetUserId = ""; 
                document.getElementById('customer-name-display').innerText = "客戶名稱，請掃描QR code";
                document.getElementById('points-input').value = "1";
                toggleFormFields(1);

            } catch (e) { 
                showCustomAlert("雲端寫入失敗"); 
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "確定";
                submitBtn.classList.remove('btn-disabled');
            }
        }

        // 載入全店會員
        async function loadAllCustomers() {
            const listEl = document.getElementById('boss-customer-list');
            listEl.innerHTML = "<div style='text-align:center; padding:15px; color:#a18b8f;'>正在撈取全店會員總冊...</div>";
            try {
                const userRef = collection(db, "users");
                const querySnapshot = await getDocs(userRef);
                if (querySnapshot.empty) { listEl.innerHTML = "<p style='text-align:center; padding:20px;'>目前店內尚無任何會員註冊。</p>"; return; }
                
                let html = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const uid = String(docSnap.id);
                    const safeName = (data.lineName || '未命名用戶').replace(/'/g, "\\'"); 
                    html += `
                        <div class="customer-item">
                            <div class="customer-info-row" onclick="toggleCustomerDetails('${uid}')">
                                <span style="font-weight:bold; color:#6e5b5e;">👤 ${data.lineName || '未命名用戶'}</span>
                                <span class="badge-points">${data.totalPoints || 0} 點</span>
                            </div>
                            <div id="details-${uid}" class="customer-details-box">
                                <p style="margin:0 0 8px 0; font-size:11px; color:#a18b8f; word-break:break-all;">LINE UID: ${uid}</p>
                                <ul id="log-list-${uid}" class="boss-log-list"><li>載入明細中...</li></ul>
                                <button class="delete-user-master-btn" onclick="showDeleteMemberModal('${uid}', '${safeName}')">❌ 永久刪除此會員資料</button>
                            </div>
                        </div>`;
                });
                listEl.innerHTML = html;
            } catch (e) { listEl.innerHTML = "<p>會員總冊載入失敗</p>"; }
        }

        window.toggleCustomerDetails = async function(uid) {
            const box = document.getElementById(`details-${uid}`);
            if (box.style.display === "block") {
                box.style.display = "none";
                return;
            }
            box.style.display = "block";
            const logListEl = document.getElementById(`log-list-${uid}`);
            
            try {
                const logRef = collection(db, "users", uid, "point_log");
                const q = query(logRef, orderBy("obtainedAt", "desc"));
                const querySnapshot = await getDocs(q);
                if (querySnapshot.empty) { logListEl.innerHTML = "<li>該會員尚無任何點數流向紀錄</li>"; return; }
                
                let html = "";
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const logId = docSnap.id;
                    let isCanceled = data.status === "canceled";
                    let statusStyle = isCanceled ? "color:#a18b8f; text-decoration:line-through;" : "color:#6e5b5e;";
                    let pointStr = data.pointsObtained > 0 ? `+${data.pointsObtained}` : `${data.pointsObtained}`;
                    
                    let showStatus = "有效";
                    if (data.status === "deducted") showStatus = "已扣除";
                    if (data.status === "canceled") showStatus = "已註銷";
                    if (data.status === "used") showStatus = "已使用";

                    html += `
                        <li style="${statusStyle} display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #fff0f2;">
                            <div>
                                <strong style="color:${data.pointsObtained > 0 ? '#c97288':'#8a7377'}">${pointStr} 點</strong> [${showStatus}]<br>
                                <small style="color:#a18b8f;">${data.remark || '無備註'} (${new Date(data.obtainedAt).toLocaleDateString()})</small>
                            </div>
                            ${!isCanceled ? `
                                <button class="cancel-point-btn" onclick="showCancelConfirmModal('${uid}', '${logId}', ${data.pointsObtained})">註銷此筆</button>
                            ` : '<span style="font-size:12px; color:#a18b8f;">已註銷</span>'}
                        </li>`;
                });
                logListEl.innerHTML = html;
            } catch (e) { logListEl.innerHTML = "<li>明細加載失敗</li>"; }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const pointsInput = document.getElementById('points-input');
            if(pointsInput) {
                pointsInput.addEventListener('input', (e) => {
                    let val = parseInt(e.target.value) || 0;
                    toggleFormFields(val);
                });
            }
        });

        window.startScan = startScan; window.changePoints = changePoints; window.setExpireDays = setExpireDays; window.confirmSubmit = confirmSubmit; window.closeCustomAlert = closeCustomAlert; window.handleCustomerTitleClick = handleCustomerTitleClick; window.handleStaffTitleClick = handleStaffTitleClick; window.loadAllCustomers = loadAllCustomers; window.closeBossLoginModal = closeBossLoginModal; window.confirmBossLogin = confirmBossLogin; window.showCancelConfirmModal = showCancelConfirmModal; window.closeCancelConfirmModal = closeCancelConfirmModal; window.executeCancelPoint = executeCancelPoint; window.showDeleteMemberModal = showDeleteMemberModal; window.closeDeleteMemberModal = closeDeleteMemberModal; window.executeDeleteMember = executeDeleteMember; window.setDeductRemark = setDeductRemark;
    </script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: #fffbfc; padding: 15px 10px; color: #5c4d50; touch-action: manipulation; }
        .card { background-color: #fff5f6; border-radius: 16px; padding: 24px; width: 95%; max-width: 360px; margin: 0 auto 20px auto; box-shadow: 0 4px 20px rgba(240, 210, 215, 0.25); box-sizing: border-box; }
        h1, h2, h3 { color: #c97288; font-size: 24px; margin: 5px 0; font-weight: bold; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .user-name { font-size: 18px; font-weight: bold; margin: 12px 0; color: #6e5b5e; }
        .points-section { background-color: white; border: 2px dashed #fcdce2; border-radius: 12px; padding: 12px; margin: 18px 0; }
        .points-num { font-size: 46px; font-weight: bold; color: #c97288; }
        .qrcode-section { margin: 20px auto; padding: 12px; background: #fff; width: 180px; height: 180px; box-shadow: 0 4px 12px rgba(240, 210, 215, 0.2); border-radius: 8px; }
        .history-section { background-color: #fff5f6; border-radius: 16px; padding: 20px; width: 95%; max-width: 360px; margin: 0 auto; box-shadow: 0 4px 20px rgba(240, 210, 215, 0.25); text-align: left; box-sizing: border-box; }
        .history-section h3 { font-size: 15px; margin: 0 0 12px 0; color: #8a7377; border-bottom: 1px solid #fcdce2; padding-bottom: 8px; }
        .history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; font-size: 13px; }
        .history-list li { padding: 10px 0; border-bottom: 1px solid #fff0f2; color: #6e5b5e; }
        .history-list li strong { color: #c97288; }
        .history-list li small { color: #a18b8f; }
        .scan-btn { width: 100%; padding: 15px; background-color: #ffeef0; color: #c97288; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; margin: 15px 0; transition: background 0.2s; box-shadow: 0 2px 6px rgba(240, 210, 215, 0.15); }
        .scan-btn:hover { background-color: #ffd9e0; }
        .status-box { background: white; border-left: 4px solid #ffeef0; padding: 10px; font-size: 13px; text-align: left; color: #8a7377; border-radius: 0 4px 4px 0; }
        
        .panel { display: block; border-top: 1px dashed #fcdce2; padding-top: 15px; text-align: left; }
        
        .counter-box { display: flex; align-items: center; }
        .btn-counter { width: 45px; height: 40px; background: white; border: 1px solid #fcdce2; font-size: 20px; font-weight: bold; color: #c97288; cursor: pointer; }
        .btn-counter:first-child { border-radius: 6px 0 0 6px; }
        .btn-counter:last-child { border-radius: 0 6px 6px 0; }
        .input-points { width: 70px; height: 40px; text-align: center; font-size: 18px; border-top: 1px solid #fcdce2; border-bottom: 1px solid #fcdce2; border-left: none; border-right: none; font-weight: bold; color: #c97288; background: white; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .radio-btn { background: white; border: 1px solid #fcdce2; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #8a7377; cursor: pointer; }
        .radio-btn input { display: none; }
        .radio-btn:has(input:checked) { background: #ffeef0; color: #c97288; border-color: #fcdce2; font-weight: bold; }
        
        input[type="text"], input[type="password"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #fcdce2; 
            border-radius: 8px; 
            box-sizing: border-box; 
            background-color: white; 
            color: #5c4d50; 
            font-size: 16px; 
        }
        input:focus { outline: none; border-color: #c97288; }
        
        .submit-btn { width: 100%; padding: 14px; background-color: #ffeef0; color: #c97288; border: none; font-size: 16px; font-weight: bold; margin-top: 15px; border-radius: 10px; cursor: pointer; transition: background 0.2s; box-shadow: 0 2px 6px rgba(240, 210, 215, 0.15); }
        .submit-btn:hover { background-color: #ffd9e0; }
        .btn-disabled { background-color: #e0e0e0 !important; color: #a0a0a0 !important; border: 1px solid #d0d0d0 !important; cursor: not-allowed !important; box-shadow: none !important; }
        
        .customer-list-container { text-align: left; margin-top: 15px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .customer-item { background: white; border: 1px solid #fcdce2; border-radius: 10px; margin-bottom: 10px; padding: 12px; box-shadow: 0 2px 6px rgba(240,210,215,0.1); }
        .customer-info-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .badge-points { background: #ffeef0; color: #c97288; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .customer-details-box { display: none; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #fcdce2; }
        .boss-log-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
        .cancel-point-btn { background: #fff0f2; color: #d9534f; border: 1px solid #fcdce2; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .cancel-point-btn:hover { background: #d9534f; color: white; border-color: #d9534f; }
        
        .delete-user-master-btn { width: 100%; margin-top: 15px; padding: 10px; background-color: #fff0f1; color: #d9534f; border: 1px dashed #fcdce2; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .delete-user-master-btn:hover { background-color: #fce4e4; }

        .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .custom-alert-box { background: white; padding: 25px; border-radius: 16px; max-width: 320px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.25); text-align: center; animation: popIn 0.2s ease-out; }
        .custom-alert-text { font-size: 16px; font-weight: bold; color: #5c4d50; margin-bottom: 20px; line-height: 1.4; word-break: break-all; }
        .custom-alert-btn { background: #ffeef0; color: #c97288; border: none; padding: 11px 30px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .custom-alert-btn:hover { background: #ffd9e0; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px 20px; border-radius: 16px; max-width: 330px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; animation: popIn 0.3s ease-out; }
        .modal-title { font-size: 18px; font-weight: bold; color: #c97288; margin-bottom: 15px; }
        .modal-text { font-size: 14px; color: #6e5b5e; margin-bottom: 20px; line-height: 1.6; }
        .modal-btn-row { display: flex; gap: 10px; margin-top: 15px; }
        
        .modal-btn-cancel { flex: 1; background: #fff; color: #a18b8f; border: 1px solid #fcdce2; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .modal-btn-cancel:hover { background: #fffcfc; }
        
        .modal-btn-confirm { flex: 1; background: #ffeef0; color: #c97288; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .modal-btn-confirm:hover { background: #ffd9e0; }
        
        .modal-btn-danger-confirm { flex: 1; background: #d9534f; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .modal-btn-danger-confirm:hover { background: #c9302c; }
        
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="customer-view" style="display:none;">
        <div class="card">
            <h1 onclick="handleCustomerTitleClick()" style="cursor: pointer;">集點卡</h1>
            <div id="username" class="user-name loading">正在載入您的 LINE 資訊...</div>
            <div class="points-section">
                <p style="margin:0; color:#8a7377; font-size: 14px;">目前可用總點數</p>
                <div id="points-display" class="points-num">--</div>
            </div>
            <p style="font-size:13px; color:#c97288; font-weight:bold;">請出示下方條碼給店家掃描</p>
            <div id="qrcode" class="qrcode-section"></div>
        </div>
        <div class="history-section">
            <h3>歷史點數明細 (含過期日)</h3>
            <ul id="history-list" class="history-list"><li>載入中...</li></ul>
        </div>
    </div>

    <div id="staff-view" style="display:none;" class="card">
        <h2 onclick="handleStaffTitleClick()" style="cursor: pointer;">店家管理後台</h2>
        <div id="staff-status" class="status-box">請點擊下方按鈕開始掃描。</div>
        <button class="scan-btn" onclick="startScan()">📷 掃描會員</button>
        
        <div id="action-panel" class="panel">
            <div style="background:white; padding:10px; font-weight:bold; color: #c97288; border: 1px solid #fcdce2; border-radius: 6px; text-align: center;" id="customer-name-display">請掃描客戶QR code</div>
            <div style="margin: 18px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 8px;">發放/扣除點數：</label>
                <div class="counter-box">
                    <button class="btn-counter" onclick="changePoints(-1)">-</button>
                    <input type="number" id="points-input" class="input-points" value="1">
                    <button class="btn-counter" onclick="changePoints(1)">+</button>
                </div>
            </div>
            
            <div id="expiry-group" style="margin: 18px 0;">
                <label style="font-weight:bold;">點數有效期限：</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" name="expiry" onclick="setExpireDays(180)" checked>6 個月</label>
                    <label class="radio-btn"><input type="radio" name="expiry" onclick="setExpireDays('custom')">自訂天數</label>
                </div>
                <input type="number" id="custom-days-input" value="180" style="display:none; margin-top:8px;">
            </div>
            
            <div id="remark-add-group" style="margin: 18px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 8px;">異動備註：</label>
                <input type="text" id="remark-input-add" placeholder="例如：消費滿百、活動贈點">
            </div>
            
            <div id="remark-deduct-group" style="margin: 18px 0; display:none;">
                <label style="font-weight:bold; display:block; margin-bottom: 8px;">扣除原因(必選)：</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" id="rb-deduct-1" name="deduct_remark" onclick="setDeductRemark('兌換券')" checked>兌換券</label>
                    <label class="radio-btn"><input type="radio" id="rb-deduct-2" name="deduct_remark" onclick="setDeductRemark('誤發扣除')">誤發扣除</label>
                    <label class="radio-btn"><input type="radio" id="rb-deduct-custom" name="deduct_remark" onclick="setDeductRemark('custom')">手動輸入</label>
                </div>
                <input type="text" id="custom-remark-deduct-box" placeholder="請手動填寫特殊扣除原因" style="display:none; margin-top:8px;">
            </div>
            
            <div style="margin: 18px 0;">
                <label style="font-weight:bold; display:block; margin-bottom: 8px;">管理員密碼：</label>
                <input type="password" id="staff-pass" placeholder="請輸入後台密碼">
            </div>
            <div style="margin-top: 15px;">
                <button id="staff-submit-btn" class="submit-btn" onclick="confirmSubmit()">確定</button>
            </div>
        </div>
    </div>

    <div id="boss-view" style="display:none;" class="card">
        <h2>最美老闆娘後台系統</h2>
        <div style="background:white; padding:8px; border-left:4px solid #c97288; font-size:12px; text-align:left; color:#8a7377; margin-bottom:15px;">
            提示：點擊下方會員列可直接展開「點數明細」，並可逐筆註銷帳目。
        </div>
        <button class="scan-btn" onclick="loadAllCustomers()">🔄 重新整理會員名冊</button>
        
        <div id="boss-customer-list" class="customer-list-container"></div>
    </div>

    <div id="custom-alert-overlay" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="alert-msg" class="custom-alert-text">提示訊息</div>
            <button class="custom-alert-btn" onclick="closeCustomAlert()">確定</button>
        </div>
    </div>

    <div id="boss-login-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">輸入密碼</div>
            <div class="modal-text">請輸入最美老闆娘專用密碼：</div>
            <input type="password" id="boss-pass-input" placeholder="請輸入安全驗證碼" style="margin-bottom: 15px;">
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeBossLoginModal()">取消</button>
                <button class="modal-btn-confirm" onclick="confirmBossLogin()">解鎖系統</button>
            </div>
        </div>
    </div>

    <div id="cancel-confirm-overlay" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">最高權限操作</div>
            <div id="cancel-confirm-msg" class="modal-text">確定要註銷這筆紀錄嗎？</div>
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeCancelConfirmModal()">拒絕</button>
                <button class="modal-btn-confirm" onclick="executeCancelPoint()">確定註銷</button>
            </div>
        </div>
    </div>

    <div id="delete-member-overlay" class="modal-overlay">
        <div class="modal-box" style="border: 2px solid #d9534f;">
            <div class="modal-title" style="color: #d9534f;">🚨 永久刪除會員</div>
            <div id="delete-member-msg" class="modal-text" style="text-align: left; font-size: 13px;">確認刪除訊息</div>
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="font-size: 12px; font-weight: bold; color: #d9534f; display: block; margin-bottom: 5px;">請手動輸入「del」以執行刪除權限：</label>
                <input type="text" id="delete-confirm-input" placeholder="請精準輸入 del">
            </div>
            <div class="modal-btn-row">
                <button class="modal-btn-cancel" onclick="closeDeleteMemberModal()">取消</button>
                <button class="modal-btn-danger-confirm" onclick="executeDeleteMember()">強行永久刪除</button>
            </div>
        </div>
    </div>

</body>
</html>
